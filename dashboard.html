<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #FAF8F4;
    --ink: #1E2A32;
    --muted: #6B6F76;
    --rose: #F6DCE2;
    --card-bg: #EFEBE2;
    --gems-bg: #E4EFE6;
    --gems-text: #2F6B45;
    --streak-bg: #FBE9D6;
    --streak-text: #9A5B12;
    --primary: #1E2A32;
    --primary-text: #FAF8F4;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body { min-height: 100dvh; }

  .screen {
    width: 100%;
    max-width: 430px;
    min-height: 100dvh;
    margin: 0 auto;
    padding: 28px 20px calc(110px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--primary-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 16px;
  }

  .header h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--ink);
    margin: 0;
  }

  .header .greeting {
    font-size: 12px;
    color: var(--muted);
    margin: 0 0 2px;
  }

  .header .bell {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--ink);
  }

  .panel {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 6px 18px rgba(30,42,50,0.06);
  }

  .panel h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin: 0 0 12px;
  }

  .mission-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .mission {
    background: var(--bg);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .mission-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--gems-bg);
    color: var(--gems-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex: none;
  }

  .mission-name {
    font-size: 14px;
    color: var(--ink);
    flex: 1;
  }

  .mission-reward {
    font-size: 13px;
    font-weight: 700;
    color: var(--gems-text);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .stat-card {
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 6px 18px rgba(30,42,50,0.06);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stat-card.gems { background: var(--gems-bg); }
  .stat-card.streak { background: var(--streak-bg); }

  .stat-icon {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
  }

  .stat-card.gems .stat-icon { background: rgba(47,107,69,0.14); color: var(--gems-text); }
  .stat-card.streak .stat-icon { background: rgba(154,91,18,0.14); color: var(--streak-text); }

  .stat-label { font-size: 12px; color: var(--muted); margin: 0; }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
  }

  .stat-card.gems .stat-value { color: var(--gems-text); }
  .stat-card.streak .stat-value { color: var(--streak-text); }

  .navbar {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 390px;
    background: var(--ink);
    border-radius: 999px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 8px;
    box-shadow: 0 10px 30px rgba(30,42,50,0.25);
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: rgba(250,248,244,0.55);
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 999px;
  }

  .nav-item i { font-size: 20px; }
  .nav-item span { font-size: 10px; font-weight: 600; }

  .nav-item.active {
    color: var(--primary-text);
    background: rgba(250,248,244,0.12);
  }
</style>
</head>
<body>
  <div class="screen">

    <div class="header">
      <div class="header-left">
        <div class="avatar">K</div>
        <div>
          <p class="greeting">Selamat datang kembali</p>
          <h1>Hai, Kamu</h1>
        </div>
      </div>
      <div class="bell"><i class="ti ti-bell"></i></div>
    </div>

    <div class="panel">
      <h2>Misi hari ini</h2>
      <div class="mission-list">
        <div class="mission">
          <div class="mission-icon"><i class="ti ti-door-enter"></i></div>
          <span class="mission-name">Buka aplikasi hari ini</span>
          <span class="mission-reward"><i class="ti ti-diamond"></i>+10</span>
        </div>
        <div class="mission">
          <div class="mission-icon"><i class="ti ti-checklist"></i></div>
          <span class="mission-name">Selesaikan 1 tugas</span>
          <span class="mission-reward"><i class="ti ti-diamond"></i>+20</span>
        </div>
        <div class="mission">
          <div class="mission-icon"><i class="ti ti-notebook"></i></div>
          <span class="mission-name">Isi catatan keuangan</span>
          <span class="mission-reward"><i class="ti ti-diamond"></i>+15</span>
        </div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card gems">
        <div class="stat-icon"><i class="ti ti-diamond"></i></div>
        <p class="stat-label">Gems</p>
        <div class="stat-value">240</div>
      </div>
      <div class="stat-card streak">
        <div class="stat-icon"><i class="ti ti-flame"></i></div>
        <p class="stat-label">Streak</p>
        <div class="stat-value">5 hari</div>
      </div>
    </div>

  </div>

  <div class="navbar">
    <a href="dashboard.html" class="nav-item active">
      <i class="ti ti-home"></i>
      <span>Beranda</span>
    </a>
    <a href="misi.html" class="nav-item">
      <i class="ti ti-target-arrow"></i>
      <span>Misi</span>
    </a>
    <a href="toko.html" class="nav-item">
      <i class="ti ti-shopping-bag"></i>
      <span>Toko</span>
    </a>
    <a href="profil.html" class="nav-item">
      <i class="ti ti-user"></i>
      <span>Profil</span>
    </a>
  </div>
</body>
</html>
