<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<meta name="theme-color" content="#181818">
<title>Detail Produk — orbitxy.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#181818;--bg1:#1a1a1a;--bg2:#212121;--bg3:#2a2a2a;
  --line:#2E2E2E;--line2:#3a3a3a;
  --em:#34d399;--em-rgb:52,211,153;
  --red:#f87171;--red-rgb:248,113,113;
  --t1:#e5e5e5;--t2:#a0a0a0;--t3:#616161;--t4:rgba(255,255,255,.07);
  --font:'DM Sans',system-ui,sans-serif;--rs:4px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px;line-height:1.5}
body{background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);background-size:50px 50px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:2px}

.notif{position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-12px);display:flex;align-items:center;gap:.4rem;padding:.52rem .95rem .52rem .68rem;border-radius:4px;font-size:.72rem;font-weight:600;z-index:99999;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:min(360px,90vw);backdrop-filter:blur(12px);box-shadow:0 8px 28px rgba(0,0,0,.7)}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.notif.info{background:rgba(12,12,14,.97);border:1px solid rgba(255,255,255,.1);color:var(--t1)}
.notif.ok{background:rgba(12,12,14,.97);border:1px solid rgba(var(--em-rgb),.3);color:var(--em)}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:5000;display:none;align-items:center;justify-content:center;padding:1rem}
.lightbox.on{display:flex}
.lightbox img{max-width:100%;max-height:88vh;border-radius:4px;object-fit:contain}
.lb-close{position:fixed;top:1.1rem;right:1.1rem;width:36px;height:36px;border-radius:4px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:var(--t1);cursor:pointer;font-size:1rem}

.nav{height:46px;background:rgba(24,24,14,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.6rem;padding:0 1.1rem;position:sticky;top:0;z-index:50}
.nav-logo{font-size:.82rem;font-weight:700;color:var(--em);text-decoration:none}
.nav-breadcrumb{display:flex;gap:.28rem;font-size:.62rem;color:var(--t3);overflow:hidden;flex:1;min-width:0}
.nav-breadcrumb a{color:var(--t3);text-decoration:none}
.nav-breadcrumb .cur{color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
.nav-btn{font-size:.68rem;font-weight:600;color:var(--t2);background:var(--bg2);border:1px solid var(--line2);border-radius:var(--rs);padding:.3rem .75rem;text-decoration:none}

.wrap{max-width:1100px;margin:0 auto;padding:1.75rem 1.1rem 5rem}
.product-top{display:grid;grid-template-columns:minmax(0,420px) 1fr;gap:2.25rem;margin-bottom:2rem;align-items:start}
@media(max-width:860px){.product-top{grid-template-columns:1fr;gap:1.5rem}}

.gallery-main{aspect-ratio:16/9;border-radius:var(--rs);overflow:hidden;background:var(--bg2);border:1px solid var(--line2);position:relative;cursor:zoom-in}
.gallery-main img{width:100%;height:100%;object-fit:cover;display:block}
.gallery-main .no-img{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;color:var(--t3)}
.gbadge{position:absolute;top:.6rem;left:.6rem;font-size:.55rem;font-weight:800;text-transform:uppercase;padding:.16rem .5rem;border-radius:4px;background:rgba(59,130,246,.2);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}

.prod-cat-row{display:flex;gap:.4rem;align-items:center;margin-bottom:.7rem}
.prod-type-badge{font-size:.58rem;font-weight:700;text-transform:uppercase;padding:.18rem .52rem;border-radius:4px;background:rgba(var(--em-rgb),.12);color:var(--em);border:1px solid rgba(var(--em-rgb),.22)}
.prod-cat-txt{font-size:.63rem;color:var(--t3)}
.prod-title{font-size:clamp(1.35rem,2.8vw,1.85rem);font-weight:400;margin-bottom:.85rem}

.price-block{padding:.7rem .85rem;background:var(--bg2);border-radius:var(--rs);border:1px solid var(--line);margin-bottom:1rem}
.price-from{font-size:.58rem;text-transform:uppercase;font-weight:600;color:var(--t3);margin-bottom:.15rem}
.price-main{font-size:clamp(1.25rem,2.8vw,1.65rem);font-weight:800;color:var(--em)}

.buy-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.btn-buy{font-family:var(--font);font-size:.76rem;font-weight:600;padding:0 1.1rem;height:38px;border-radius:3px;border:1px solid rgba(var(--em-rgb),.45);background:rgba(var(--em-rgb),.1);color:var(--em);cursor:pointer}
.btn-buy:hover:not(:disabled){background:#059669;border-color:#059669;color:#fff}
.btn-buy:disabled{opacity:.35;cursor:not-allowed}
.btn-buy-ghost{font-family:var(--font);font-size:.74rem;padding:0 .9rem;height:38px;border-radius:3px;border:1px solid var(--line2);background:transparent;color:var(--t3);text-decoration:none;display:inline-flex;align-items:center;gap:.3rem}

.share-row{display:flex;gap:.45rem;padding-top:.6rem;border-top:1px solid var(--line)}
.share-link{font-size:.63rem;font-weight:600;color:var(--t2);background:var(--bg2);border:1px solid var(--line2);border-radius:var(--rs);padding:.32rem .72rem;cursor:pointer}

.tabs-wrap{border-bottom:1px solid var(--line);margin-bottom:1rem}
.tab{font-family:var(--font);font-size:.75rem;font-weight:600;padding:.7rem 1.1rem;border:none;background:none;color:var(--em);border-bottom:2px solid var(--em)}
.desc-body{font-size:.77rem;color:var(--t2);line-height:1.9;white-space:pre-wrap}

.buy-widget{position:sticky;top:62px;background:var(--bg1);border:1px solid var(--line2);border-radius:4px;padding:.9rem;box-shadow:0 4px 24px rgba(0,0,0,.25)}
.bw-prod-name{font-size:.8rem;font-weight:700;margin-bottom:.3rem}
.bw-price{font-size:1.2rem;font-weight:800;color:var(--em);margin-bottom:.7rem}
.btn-pay-sidebar{width:100%;font-family:var(--font);font-size:.78rem;font-weight:700;padding:.58rem;border-radius:var(--rs);background:#047857;color:#fff;border:1px solid #047857;cursor:pointer;height:40px}
.btn-pay-sidebar:disabled{opacity:.35;cursor:not-allowed}

.product-bottom{display:grid;grid-template-columns:1fr 300px;gap:2rem}
@media(max-width:960px){.buy-widget{display:none}.product-bottom{grid-template-columns:1fr}}

.mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(24,24,14,.97);border-top:1px solid var(--line2);padding:.6rem 1rem calc(.6rem + env(safe-area-inset-bottom));gap:.65rem;align-items:center}
@media(max-width:960px){.mob-bar{display:flex}.wrap{padding-bottom:5.5rem}}
.mob-price-val{font-size:1rem;font-weight:800;color:var(--em)}
.mob-price-lbl{font-size:.58rem;color:var(--t3)}
.mob-btn{margin-left:auto;font-family:var(--font);font-size:.76rem;font-weight:700;padding:0 1.15rem;height:40px;border-radius:var(--rs);background:#047857;color:#fff;border:1px solid #047857;cursor:pointer}

.page-footer{text-align:center;padding:1.1rem 1rem;font-size:.64rem;color:var(--t3);border-top:1px solid var(--line)}
.skel{border-radius:var(--rs);background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:400% 100%;animation:shimmer 1.5s ease infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="notif" id="notif"><span id="notifMsg"></span></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">&#10005;</button>
  <img id="lbImg" src="" alt="Foto">
</div>

<nav class="nav">
  <a href="dashboard.html" class="nav-logo">orbitxy.com</a>
  <div class="nav-breadcrumb">
    <a href="dashboard.html">Beranda</a>&nbsp;/&nbsp;
    <span id="breadcrumbCat">Produk</span>&nbsp;/&nbsp;
    <span class="cur" id="breadcrumbName">—</span>
  </div>
  <a href="dashboard.html" class="nav-btn">Kembali</a>
</nav>

<div class="wrap">
  <div class="product-top">
    <div>
      <div class="gallery-main" id="galleryMain">
        <div id="galleryBadge"></div>
        <div class="no-img" id="galleryNoImg">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span style="font-size:.63rem">Tidak ada gambar</span>
        </div>
        <img id="galleryImg" src="" alt="" style="display:none" onclick="openLightbox(this.src)">
      </div>
    </div>

    <div id="productInfo">
      <div id="infoSkeleton">
        <div class="skel" style="width:40%;height:20px;margin-bottom:.8rem"></div>
        <div class="skel" style="width:88%;height:28px;margin-bottom:1.1rem"></div>
        <div class="skel" style="height:46px;margin-bottom:.9rem"></div>
        <div class="skel" style="height:48px"></div>
      </div>

      <div id="infoContent" style="display:none">
        <div class="prod-cat-row">
          <span class="prod-type-badge" id="prodTypeBadge">Produk</span>
          <span class="prod-cat-txt" id="prodCatTxt">Kategori</span>
        </div>
        <h1 class="prod-title" id="prodTitle">—</h1>
        <div class="price-block" id="priceBlock">
          <div class="price-from">Harga</div>
          <div class="price-main" id="priceMain">—</div>
          <div id="stockTag" style="font-size:.58rem;font-weight:700;color:var(--em);margin-top:.15rem"></div>
        </div>
        <div class="buy-actions">
          <button class="btn-buy" id="mainBuyBtn" onclick="notify('Pembayaran sedang dikembangkan','info')">Beli Sekarang</button>
          <a class="btn-buy-ghost" href="dashboard.html">← Kembali</a>
        </div>
        <div class="share-row">
          <button class="share-link" onclick="copyLink()">Salin Link</button>
        </div>
      </div>
    </div>
  </div>

  <div class="product-bottom">
    <div>
      <div class="tabs-wrap"><button class="tab">Deskripsi</button></div>
      <div id="descContent">
        <div class="skel" style="height:12px;width:92%;margin-bottom:.5rem"></div>
        <div class="skel" style="height:12px;width:78%"></div>
      </div>
    </div>

    <div class="buy-widget" id="buyWidget">
      <div class="bw-prod-name" id="bwName">—</div>
      <div class="bw-price" id="bwPrice">—</div>
      <button class="btn-pay-sidebar" id="sidebarBuyBtn" onclick="notify('Pembayaran sedang dikembangkan','info')">Beli Sekarang</button>
    </div>
  </div>
</div>

<div class="mob-bar" id="mobBar">
  <div>
    <div class="mob-price-lbl">Harga</div>
    <div class="mob-price-val" id="mobPrice">—</div>
  </div>
  <button class="mob-btn" onclick="notify('Pembayaran sedang dikembangkan','info')">Beli Sekarang</button>
</div>

<footer class="page-footer">&copy; <span id="ftYear"></span> orbitxy.com</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';
var supabaseClient = supabase.createClient(
  'https://ygjpwaftccewntwwoixs.supabase.co',
  'sb_publishable_4IdyoPpEW-It9IWLZOrSAQ_WuumXkl9'
);

document.getElementById('ftYear').textContent = new Date().getFullYear();

function idr(n){var v=Number(n);if(!isFinite(v)||isNaN(v))v=0;return 'Rp'+v.toLocaleString('id-ID');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');}

var _notifT=null;
function notify(msg,type){
  var n=document.getElementById('notif'),msgEl=document.getElementById('notifMsg');
  n.className='notif '+(type||'info'); msgEl.textContent=msg;
  n.classList.add('show'); if(_notifT)clearTimeout(_notifT); _notifT=setTimeout(function(){n.classList.remove('show');},3200);
}

function getParam(k){return new URLSearchParams(window.location.search).get(k);}

function renderError(msg){
  document.getElementById('infoSkeleton').style.display='none';
  document.getElementById('infoContent').style.display='block';
  document.getElementById('prodTitle').innerHTML=msg;
  document.getElementById('priceBlock').style.display='none';
  document.querySelector('.buy-actions').style.display='none';
  document.getElementById('buyWidget').style.display='none';
  document.getElementById('mobBar').style.display='none';
}

function openLightbox(src){if(!src)return;document.getElementById('lbImg').src=src;document.getElementById('lightbox').classList.add('on');document.body.style.overflow='hidden';}
function closeLightbox(){document.getElementById('lightbox').classList.remove('on');document.body.style.overflow='';}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox();});
function copyLink(){try{navigator.clipboard.writeText(window.location.href);notify('Link berhasil disalin!','ok');}catch(e){notify('Salin: '+window.location.href,'info');}}

async function init(){
  var pid = getParam('id');
  if(!pid){ renderError('Produk tidak ditemukan.<br><a href="dashboard.html" style="color:var(--em)">Kembali ke dashboard</a>'); return; }

  var { data: p, error } = await supabaseClient
    .from('products')
    .select('*')
    .eq('id', pid)
    .single();

  if(error || !p){
    renderError('Produk tidak ditemukan.<br><a href="dashboard.html" style="color:var(--em)">Kembali ke dashboard</a>');
    return;
  }

  renderProduct(p);
}

function renderProduct(p){
  document.title = esc(p.name) + ' — orbitxy.com';
  document.getElementById('breadcrumbCat').textContent = p.category || 'Produk';
  document.getElementById('breadcrumbName').textContent = p.name;

  if(p.thumbnail){
    var gi=document.getElementById('galleryImg');
    gi.src=p.thumbnail; gi.alt=p.name; gi.style.display='block';
    document.getElementById('galleryNoImg').style.display='none';
  }

  if(p.is_new) document.getElementById('galleryBadge').innerHTML='<span class="gbadge">Baru</span>';

  document.getElementById('infoSkeleton').style.display='none';
  document.getElementById('infoContent').style.display='block';
  document.getElementById('prodTypeBadge').textContent = p.category || 'Produk';
  document.getElementById('prodCatTxt').textContent = p.category || '';
  document.getElementById('prodTitle').textContent = p.name;

  var price = typeof p.price === 'number' ? p.price : 0;
  var priceText = price === 0 ? 'Gratis' : idr(price);
  document.getElementById('priceMain').textContent = priceText;
  document.getElementById('mobPrice').textContent = priceText;
  document.getElementById('bwPrice').textContent = priceText;
  document.getElementById('bwName').textContent = p.name;

  var stockTag = document.getElementById('stockTag');
  if(p.stock === null || p.stock === undefined || p.stock < 0){
    stockTag.textContent = '∞ Stok Unlimited';
  } else if(p.stock === 0){
    stockTag.textContent = 'Stok Habis';
    stockTag.style.color = 'var(--red)';
    document.getElementById('mainBuyBtn').disabled = true;
    document.getElementById('sidebarBuyBtn').disabled = true;
  } else {
    stockTag.textContent = 'Stok ' + p.stock;
  }

  if(p.active === false){
    var notice = document.createElement('div');
    notice.style.cssText = 'background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:4px;padding:.6rem .85rem;font-size:.72rem;color:var(--red);margin-bottom:.8rem';
    notice.textContent = 'Produk ini sedang tidak tersedia.';
    document.getElementById('infoContent').prepend(notice);
    document.querySelector('.buy-actions').style.display='none';
    document.getElementById('buyWidget').style.display='none';
    document.getElementById('mobBar').style.display='none';
  }

  var dc = document.getElementById('descContent');
  var desc = p.description || '';
  dc.innerHTML = desc
    ? '<div class="desc-body">'+esc(desc).replace(/\n/g,'<br>')+'</div>'
    : '<p style="font-size:.73rem;color:var(--t3)">Tidak ada deskripsi untuk produk ini.</p>';
}

init();
</script>
</body>
</html>
