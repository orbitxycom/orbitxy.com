<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Explore the app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F4;
    --ink: #1E2A32;
    --muted: #6B6F76;
    --rose: #F6DCE2;
    --rose-line: #1E2A32;
    --border: #E7E3DA;
    --primary: #1E2A32;
    --primary-text: #FAF8F4;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100dvh;
  }

  .screen {
    position: relative;
    width: 100%;
    max-width: 430px;
    min-height: 100dvh;
    margin: 0 auto;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 0 28px;
  }

  .rays {
    position: absolute;
    top: -10%;
    left: 50%;
    width: 900px;
    height: 900px;
    transform: translateX(-50%);
    background: repeating-conic-gradient(
      from 0deg,
      rgba(30,42,50,0.035) 0deg 1.2deg,
      transparent 1.2deg 6deg
    );
    -webkit-mask-image: radial-gradient(circle at center, black 0%, black 40%, transparent 72%);
    mask-image: radial-gradient(circle at center, black 0%, black 40%, transparent 72%);
    pointer-events: none;
  }

  .sparkle-wrap {
    position: relative;
    margin: 15vh auto 0;
    width: 170px;
    height: 170px;
  }

  .sparkle-wrap svg { width: 100%; height: 100%; overflow: visible; }

  .content {
    position: relative;
    text-align: center;
    margin-top: 40px;
  }

  h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--ink);
    margin: 0 0 12px;
  }

  .subtitle {
    font-size: 15px;
    line-height: 1.5;
    color: var(--muted);
    max-width: 280px;
    margin: 0 auto;
  }

  .actions {
    position: relative;
    margin-top: auto;
    padding-bottom: calc(32px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  button {
    width: 100%;
    height: 54px;
    border-radius: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  button:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--primary);
    color: var(--primary-text);
  }

  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--border);
  }

  button:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }
</style>
</head>
<body>
  <div class="screen">
    <div class="rays"></div>

    <div class="sparkle-wrap">
      <svg viewBox="0 0 170 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustrasi bintang berkilau">
        <path d="M85 22 C90 66 92 72 134 78 C92 84 90 90 85 134 C80 90 78 84 36 78 C78 72 80 66 85 22 Z"
              fill="var(--rose)" stroke="var(--rose-line)" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M28 50 L31 58 L39 61 L31 64 L28 72 L25 64 L17 61 L25 58 Z"
              fill="none" stroke="var(--muted)" stroke-width="1.3"/>
        <path d="M132 30 L135.5 39 L145 42.5 L135.5 46 L132 55 L128.5 46 L119 42.5 L128.5 39 Z"
              fill="none" stroke="var(--muted)" stroke-width="1.3"/>
      </svg>
    </div>

    <div class="content">
      <h1>Explore the app</h1>
      <p class="subtitle">Now your finances are in one place and always under control</p>
    </div>

    <div class="actions">
      <button class="btn-primary" type="button">Sign in</button>
      <button class="btn-secondary" type="button">Create account</button>
    </div>
  </div>
</body>
</html>
