<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F4;
    --ink: #1E2A32;
    --muted: #6B6F76;
    --rose: #F6DCE2;
    --rose-line: #1E2A32;
    --border: #E7E3DA;
    --field-bg: #EFEBE2;
    --primary: #1E2A32;
    --primary-text: #FAF8F4;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body { min-height: 100dvh; }

  .screen {
    position: relative;
    width: 100%;
    max-width: 430px;
    min-height: 100dvh;
    margin: 0 auto;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 0 28px;
  }

  .rays {
    position: absolute;
    top: -25%;
    left: 50%;
    width: 900px;
    height: 900px;
    transform: translateX(-50%);
    background: repeating-conic-gradient(
      from 0deg,
      rgba(30,42,50,0.035) 0deg 1.2deg,
      transparent 1.2deg 6deg
    );
    -webkit-mask-image: radial-gradient(circle at center, black 0%, black 40%, transparent 72%);
    mask-image: radial-gradient(circle at center, black 0%, black 40%, transparent 72%);
    pointer-events: none;
  }

  .sparkle-wrap {
    position: relative;
    margin: 9vh auto 0;
    width: 120px;
    height: 120px;
  }

  .sparkle-wrap svg { width: 100%; height: 100%; overflow: visible; }

  h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--ink);
    margin: 20px 0 24px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field { position: relative; }

  input {
    width: 100%;
    height: 52px;
    border-radius: 14px;
    border: none;
    background: var(--field-bg);
    padding: 0 44px 0 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
  }

  input::placeholder { color: var(--muted); }

  input:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }

  #password {
    border: 1.75px solid transparent;
    transition: border-color 0.15s ease;
  }

  #password:focus-visible {
    border-color: var(--ink);
    outline: none;
  }

  #password.error,
  #password.error:focus-visible {
    border-color: #C0392B;
  }

  .icon-slot {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    color: var(--muted);
  }

  .icon-slot svg { width: 20px; height: 20px; }

  button.toggle {
    background: none;
    border: none;
    padding: 4px;
    cursor: pointer;
  }

  button.submit {
    width: 100%;
    height: 54px;
    margin-top: 8px;
    border-radius: 16px;
    border: none;
    background: var(--primary);
    color: var(--primary-text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  button.submit:active { transform: scale(0.98); }

  button.submit:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }

  .signup {
    margin-top: auto;
    padding-bottom: calc(28px + env(safe-area-inset-bottom));
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }

  .signup a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="screen">
    <div class="rays"></div>

    <div class="sparkle-wrap">
      <svg viewBox="0 0 170 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustrasi bintang berkilau">
        <path d="M85 22 C90 66 92 72 134 78 C92 84 90 90 85 134 C80 90 78 84 36 78 C78 72 80 66 85 22 Z"
              fill="var(--rose)" stroke="var(--rose-line)" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M28 50 L31 58 L39 61 L31 64 L28 72 L25 64 L17 61 L25 58 Z"
              fill="none" stroke="var(--muted)" stroke-width="1.3"/>
        <path d="M132 30 L135.5 39 L145 42.5 L135.5 46 L132 55 L128.5 46 L119 42.5 L128.5 39 Z"
              fill="none" stroke="var(--muted)" stroke-width="1.3"/>
      </svg>
    </div>

    <h1>Log in</h1>

    <form id="login-form">
      <div>
        <label for="email">Email address</label>
        <div class="field">
          <input type="email" id="email" placeholder="you@example.com" required>
          <span class="icon-slot" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          </span>
        </div>
      </div>

      <div>
        <label for="password">Password</label>
        <div class="field">
          <input type="password" id="password" placeholder="••••••••" required>
          <button type="button" class="toggle icon-slot" data-target="password" aria-label="Tampilkan password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 5.1A10.9 10.9 0 0 1 12 5c6 0 10 6 10 6a17.7 17.7 0 0 1-3.2 3.7M6.5 6.6C3.9 8.3 2 11 2 11s4 6 10 6c1.1 0 2.1-.2 3-.5M14.1 14.1a3 3 0 0 1-4.2-4.2"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="submit">Log in</button>
    </form>

    <p class="signup">Don't have an account? <a href="create-account.html">Sign up</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      'https://ygjpwaftccewntwwoixs.supabase.co',
      'sb_publishable_4IdyoPpEW-It9IWLZOrSAQ_WuumXkl9'
    );

    document.querySelector('.toggle').addEventListener('click', function () {
      var input = document.getElementById(this.dataset.target);
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    const passwordInput = document.getElementById('password');

    passwordInput.addEventListener('input', function () {
      if (passwordInput.value.length === 0) {
        passwordInput.classList.remove('error');
      }
    });

    function delay(ms) {
      return new Promise(function (resolve) { setTimeout(resolve, ms); });
    }

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const submitBtn = e.target.querySelector('.submit');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          console.error('Supabase login error:', error.message);
          passwordInput.classList.add('error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Log in';
          return;
        }

        passwordInput.classList.remove('error');
        await delay(3000);
        window.location.href = 'dashboard.html';
      } catch (err) {
        console.error('Gagal menghubungi Supabase:', err);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
